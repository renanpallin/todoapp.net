services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - todo-data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - Jwt__Key=super-secret-dev-key-that-is-at-least-32-chars!

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  todo-data:
